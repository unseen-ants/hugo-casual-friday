<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}" data-theme="light">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="{{ if .IsPage }}page-single{{ else if .IsHome }}page-home{{ else }}page-list{{ end }}">
  <div class="site-wrapper">
    {{- partial "header.html" . -}}

    <main class="main-content">
      {{- block "main" . }}{{- end }}
    </main>

    {{- partial "footer.html" . -}}
  </div>

  {{- partial "scripts.html" . -}}
</body>
</html>
